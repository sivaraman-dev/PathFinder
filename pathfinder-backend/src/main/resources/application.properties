spring.application.name=pathfinder-backend

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/pathfinder_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=codinglover
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
# HS512 requires a key >= 64 bytes (512 bits)
jwt.secret=ThisIsASecretKeyForJWTTokenGenerationPleaseChangeItInProductionAndMakeItLongEnough1234
jwt.expiration=86400000

# OpenAI Configuration (Add your key here)
openai.api.key=your-openai-api-key
openai.api.url=https://api.openai.com/v1/chat/completions

# Server Configuration
server.port=8080

